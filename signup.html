<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DealCompass | Join the Free Pilot</title>
  <meta name="description" content="Join the DealCompass free pilot and get decision-ready tech picks with clear buy/skip context." />
  <link rel="icon" type="image/png" href="/assets/favicon-logo.png" />
  <style>
    :root { --bg:#070b16; --bg-soft:#0d1427; --surface:rgba(19,28,51,.88); --text:#f4f7ff; --muted:#a9b7dc; --border:rgba(174,195,255,.2); }
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Manrope,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,var(--bg-soft),var(--bg));}
    .wrap{width:min(100%,1040px);margin:0 auto;padding:22px 14px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(8,14,29,.7);margin-bottom:16px}
    .brand{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:.92rem;text-decoration:none;color:inherit}
    .pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:6px 10px;text-decoration:none;color:#dbe7ff;font-size:.76rem;font-weight:700}
    h1{margin:10px 0 8px;font-size:clamp(1.6rem,4.5vw,2.3rem)} .sub{margin:0 0 14px;color:var(--muted)}
    .panel{border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:12px}
    iframe{width:100%;height:980px;border:0;border-radius:12px;background:#fff}
    .fallback{margin-top:10px;color:var(--muted);font-size:.88rem}
    .fallback a{color:#cfe0ff}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar" aria-label="DealCompass signup header">
      <a class="brand" href="/" aria-label="DealCompass home">DealCompass</a>
      <a class="pill" href="/">Back to Home</a>
    </header>

    <h1>Join the Free Pilot</h1>
    <p class="sub">Get concise, decision-ready picks with practical buy/skip context.</p>

    <section class="panel" aria-label="DealCompass signup form">
      <iframe
        src="https://tally.so/embed/RG0ygJ?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        title="DealCompass Signup Form"
        loading="lazy"
      ></iframe>
      <p class="fallback">If the form doesn’t load, open it directly: <a href="https://tally.so/r/RG0ygJ" target="_blank" rel="noopener">Signup Form</a>.</p>
    </section>
  </main>
</body>
</html>
