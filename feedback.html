<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DealCompass | Feedback</title>
  <meta name="description" content="Share quick DealCompass feedback so we can improve ranking quality and future picks." />
  <link rel="canonical" href="https://dealcompass.app/feedback.html" />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
  <meta property="og:title" content="DealCompass | Feedback" />
  <meta property="og:description" content="Tell DealCompass what helped, what was unclear, and what to improve next." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dealcompass.app/feedback.html" />
  <meta property="og:site_name" content="DealCompass" />
  <meta property="og:image" content="https://dealcompass.app/assets/logo-official.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DealCompass | Feedback" />
  <meta name="twitter:description" content="Quick feedback helps us improve picks and category coverage." />
  <meta name="twitter:image" content="https://dealcompass.app/assets/logo-official.jpg" />
  <link rel="icon" type="image/png" href="/assets/favicon-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg: #050911;
      --bg-soft: #0a1020;
      --surface: rgba(20, 27, 45, 0.72);
      --surface-border: rgba(180, 200, 255, 0.12);
      --text: #edf2ff;
      --muted: #94a3c8;
      --brand: #5f8dff;
      --brand-glow: rgba(95, 141, 255, 0.28);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 0%, rgba(95, 141, 255, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(120, 100, 255, 0.08) 0%, transparent 40%);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .wrap { width: min(100%, 900px); margin: 0 auto; padding: 20px 14px 64px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      background: rgba(8, 14, 29, 0.7);
      backdrop-filter: blur(12px);
      margin-bottom: 20px;
      position: sticky;
      top: 14px;
      z-index: 20;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 8px 12px;
      color: #dbe7ff;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(255,255,255,0.03);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .hero {
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(20,27,45,0.42) 0%, rgba(10,16,32,0.02) 100%);
      padding: 26px 18px;
      margin-bottom: 14px;
    }

    .eyebrow {
      display: inline-block;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--brand);
      background: rgba(95,141,255,.12);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    h1 { margin: 0 0 8px; font-size: clamp(1.9rem, 4.8vw, 2.45rem); line-height: 1.1; letter-spacing: -0.02em; }
    .sub { margin: 0; color: var(--muted); font-size: 1.02rem; }

    .panel {
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 18px;
    }

    form { display: grid; gap: 12px; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 760px) { .row.two { grid-template-columns: 1fr 1fr; } }

    label {
      font-size: .9rem;
      color: #dbe7ff;
      font-weight: 700;
      margin-bottom: 6px;
      display: inline-block;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--surface-border);
      background: #0f1830;
      color: #f4f7ff;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px var(--brand-glow);
    }

    textarea { min-height: 120px; resize: vertical; }

    .btn {
      border: 1px solid rgba(137,170,255,.45);
      background: linear-gradient(135deg, var(--brand), #78a5ff);
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      font-size: .95rem;
      transition: transform .15s ease, box-shadow .2s ease;
      box-shadow: 0 4px 14px var(--brand-glow);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .7; cursor: wait; }

    .status { min-height: 24px; font-size: .9rem; }
    .ok { color: #9ee3b5; }
    .err { color: #ffb0b0; }

    .disclosure {
      margin-top: 20px;
      text-align: center;
      color: #64748b;
      font-size: .82rem;
    }

    .disclosure a { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar" aria-label="DealCompass feedback navigation">
      <a class="brand" href="/" aria-label="DealCompass home">
        <img src="/assets/logo-official.jpg" alt="" class="brand-logo" width="30" height="30" />
        <span>DealCompass</span>
      </a>
      <a class="pill" href="/">Back to categories</a>
    </header>

    <section class="hero" aria-label="feedback intro">
      <p class="eyebrow">Quick Feedback</p>
      <h1>Tell us what helped (and what didn’t).</h1>
      <p class="sub">Your response directly improves future picks, category coverage, and recommendation quality.</p>
    </section>

    <section class="panel" aria-label="feedback form">
      <form id="feedbackForm" novalidate>
        <div class="row two">
          <div>
            <label for="confidence_score">How confident did this page make you feel? (1–5) *</label>
            <select id="confidence_score" name="confidence_score" required>
              <option value="">Select…</option>
              <option value="5">5 - Very confident</option>
              <option value="4">4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1 - Not confident</option>
            </select>
          </div>
          <div>
            <label for="feedback_focus">What should we improve next? *</label>
            <select id="feedback_focus" name="feedback_focus" required>
              <option value="">Select…</option>
              <option value="category_expansion">Category expansion</option>
              <option value="ranking_quality">Ranking quality</option>
              <option value="verdict_depth">Verdict depth/clarity</option>
              <option value="site_ux">Site UX/navigation</option>
              <option value="deal_freshness">Deal freshness/frequency</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="row two">
          <div>
            <label for="requested_category">Category you'd like us to add</label>
            <input id="requested_category" name="requested_category" type="text" placeholder="e.g., Beauty, Fitness, Office" />
          </div>
          <div>
            <label for="what_worked">What worked well for you?</label>
            <input id="what_worked" name="what_worked" type="text" placeholder="e.g., clear rankings, concise blurbs" />
          </div>
        </div>

        <div>
          <label for="what_to_improve">What should we improve first? *</label>
          <textarea id="what_to_improve" name="what_to_improve" required></textarea>
        </div>

        <div>
          <label for="feature_request">Any feature or page you want us to add?</label>
          <textarea id="feature_request" name="feature_request"></textarea>
        </div>

        <button id="submitBtn" class="btn" type="submit">Submit feedback</button>
        <div id="status" class="status" aria-live="polite"></div>
      </form>
    </section>

    <p class="disclosure">DealCompass may earn from qualifying purchases. Contact: <a href="mailto:help@dealcompass.app">help@dealcompass.app</a></p>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const form = document.getElementById('feedbackForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = 'Submitting…';
      submitBtn.disabled = true;

      const payload = Object.fromEntries(new FormData(form).entries());
      payload.dc_campaign = params.get('dc_campaign') || '';
      payload.dc_channel = params.get('dc_channel') || '';
      payload.dc_variant = params.get('dc_variant') || '';

      try {
        const r = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const j = await r.json();
        if (!r.ok || !j.ok) throw new Error(j.error || 'submit_failed');

        statusEl.className = 'status ok';
        statusEl.textContent = 'Thanks — feedback recorded.';
        form.reset();
      } catch (err) {
        statusEl.className = 'status err';
        statusEl.textContent = 'Could not submit right now. Please try again in a moment.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
