<html lang="en">
<head>
  <meta charset="utf-8" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "CollectionPage",
          "@id": "https://dealcompass.app/past-picks.html#collectionpage",
          "url": "https://dealcompass.app/past-picks.html",
          "name": "DealCompass Past Picks Archive",
          "description": "Historical productivity and home office tech deal recommendations from DealCompass.",
          "isPartOf": {
            "@id": "https://dealcompass.app/#website"
          }
        },
        {
          "@type": "BreadcrumbList",
          "@id": "https://dealcompass.app/past-picks.html#breadcrumb",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "https://dealcompass.app/"
            },
            {
              "@type": "ListItem",

              "name": "Past Picks",
              "item": "https://dealcompass.app/past-picks.html"

          ]
        }

    }
  </script>
  <style>
    :root { --bg:#070b16; --bg-soft:#0d1427; --surface:rgba(19,28,51,.88); --text:#f4f7ff; --muted:#a9b7dc; --border:rgba(174,195,255,.2); --brand:#5f8dff; --radius:14px; }
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Manrope,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,var(--bg-soft),var(--bg));}
    .wrap{width:min(100%,1040px);margin:0 auto;padding:22px 14px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(8,14,29,.7);margin-bottom:16px}
    .topbar-left{display:inline-flex;align-items:center;gap:10px}
    .brand{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:.92rem;text-decoration:none;color:inherit}
    .category-select{background:rgba(255,255,255,.05);color:#dbe7ff;border:1px solid var(--border);border-radius:10px;padding:7px 9px;font-weight:700;font-size:.78rem}
    .top-links{display:flex;gap:8px}
    .pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:6px 10px;text-decoration:none;color:#dbe7ff;font-size:.76rem;font-weight:700}
    h1{margin:8px 0 8px;font-size:clamp(1.5rem,5vw,2.2rem)}
    .sub{margin:0 0 14px;color:var(--muted)}
    .list-wrap{border:1px solid var(--border);background:var(--surface);border-radius:18px;padding:14px;margin-top:14px}
    .list-meta{margin:0 0 10px;color:var(--muted);font-size:.88rem}
    .scroll-list{max-height:70vh;overflow-y:auto;padding-right:4px}
    .pick{display:block;text-decoration:none;color:inherit;border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:rgba(20,31,61,.9);margin-top:8px}
    .pick .title{display:block;font-weight:700;color:#dbe7ff}
    .pick small{display:block;color:var(--muted);margin-top:6px}
    .pick-cta{display:inline-block;margin-top:8px;font-size:.8rem;font-weight:700;color:#bcd1ff}
    .note{margin-top:16px;color:#91a7d8;font-size:.8rem}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media (max-width: 900px){
      .topbar{flex-direction:column;align-items:stretch;border-radius:24px;gap:10px}
      .topbar-left{width:100%;justify-content:space-between}
      .brand{font-size:.88rem}
      .category-select{min-height:38px}
      .top-links{width:100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .pill{justify-content:center;padding:8px 10px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar" aria-label="DealCompass archive header">
      <div class="topbar-left">
        <select id="categorySelect" class="category-select" aria-label="Select category">
          <option value="tech">Tech</option>
          <option value="home">Home</option>
        </select>
        <a class="brand" href="/" aria-label="DealCompass home">DealCompass</a>
      </div>
      <nav class="top-links" aria-label="Primary">
        <a class="pill" id="currentPicksNav" href="/">Current Picks</a>
        <a class="pill" id="reviewsNav" href="/reviews.html">Our Verdicts</a>
      </nav>
    </header>

    <h1>Past Picks Archive</h1>
    <p class="sub">Historical recommendations (running list). For the latest ranked deals, see <a href="/">current picks</a>.</p>

    <section class="list-wrap" aria-labelledby="archiveHeading">
      <h2 class="sr-only" id="archiveHeading">Archived picks list</h2>
      <p class="list-meta" id="listMeta">Loading…</p>
      <div id="archive" class="scroll-list"></div>
    </section>

    <p class="note"><strong>Affiliate disclosure:</strong> DealCompass may earn a commission from qualifying purchases made through partner links.</p>
  </main>

  <script>
    (() => {
      const CATEGORY_CONFIG = { tech: { label: 'Tech' }, home: { label: 'Home' } };
      const getSelectedCategory = () => {
        const raw = new URLSearchParams(window.location.search).get('category') || 'tech';
        return CATEGORY_CONFIG[raw] ? raw : 'tech';
      };
      const withCategory = (url, category) => {
        const u = new URL(url, window.location.origin);
        u.searchParams.set('category', category);
        return `${u.pathname}${u.search}`;
      };

      const hashText = (text) => {
        let hash = 0;
        for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
        return Math.abs(hash);
      };

      const extractBrand = (title) => {
        const brands = [
          ['logitech', 'Logitech'], ['ugreen', 'UGREEN'], ['anker', 'Anker'], ['asus', 'ASUS'],
          ['redragon', 'Redragon'], ['yunzii', 'YUNZII'], ['vicsoon', 'Vicsoon'], ['amazon', 'Amazon'],
          ['fire', 'Amazon'], ['samsung', 'Samsung'], ['apple', 'Apple'], ['lenovo', 'Lenovo'], ['dell', 'Dell'], ['hp', 'HP']
        ];
        const t = title.toLowerCase();
        for (const [needle, label] of brands) if (t.includes(needle)) return label;
        const first = title.match(/^\s*([A-Za-z0-9][A-Za-z0-9+\-]{1,})/);
        return first ? first[1] : '';
      };

      const detectProductCategory = (title) => {
        const t = title.toLowerCase();
        if (t.includes('trackball')) return 'trackball';
        if ((t.includes('keyboard') && t.includes('mouse')) || t.includes('combo')) return 'combo';
        if (t.includes('keyboard')) return 'keyboard';
        if (t.includes('mouse')) return 'mouse';
        if (t.includes('hub') || t.includes('dock') || t.includes('multiport')) return 'hub';
        if (t.includes('desk lamp') || /\blamp\b/.test(t) || t.includes('light bar')) return 'deskLamp';
        if (t.includes('robot vacuum') || (t.includes('robot') && t.includes('vacuum')) || t.includes('roborock')) return 'robotVacuum';
        if (t.includes('tablet') || t.includes('ipad') || t.includes('fire hd') || t.includes('galaxy tab')) return 'tablet';
        if (t.includes('monitor arm') || (t.includes('monitor') && t.includes('arm')) || t.includes('vesa')) return 'monitorArm';
        if (t.includes('charger') || t.includes('charging') || t.includes('power adapter') || /\bpd\b/.test(t)) return 'charger';
        return 'general';
      };

      const topLevelCategoryFromTitle = (title) => {
        const c = detectProductCategory(title);
        if (['robotVacuum', 'deskLamp'].includes(c)) return 'home';
        return 'tech';
      };

      const detectTitleSignals = (title) => {
        const t = title.toLowerCase();
        const featurePatterns = [
          ['wireless', /\bwireless\b|2\.4ghz|lightspeed/], ['wired', /\bwired\b/], ['bluetooth', /\bbluetooth\b/],
          ['ergonomic', /\bergonomic\b|vertical|comfort/], ['gaming', /\bgaming\b|esports|fps/], ['mmo', /\bmmo\b|side buttons|macro/],
          ['mechanical', /\bmechanical\b|linear switch|tactile switch/], ['rgb', /\brgb\b|led/], ['compact', /\bcompact\b|mini|\b75%\b|\b60%\b|small/],
          ['lightweight', /\blightweight\b|\b\d{2}g\b|\b\d{1,2}g\b/], ['trackball', /\btrackball\b/], ['aluminum', /\baluminum\b|alloy|cnc/],
          ['hot-swappable', /\bhot\s*swappable\b|hot-swap/], ['4k', /\b4k\b|\b60hz\b/], ['hdmi', /\bhdmi\b/], ['ethernet', /\bethernet\b|1gbps|\brj45\b/],
          ['100w', /\b100w\b|\b140w\b|\b65w\b|power delivery|\bpd\b/], ['usb-c', /\busb[\s-]?c\b|type-c|multiport|hub|dock/],
          ['dimmable', /\bdimmable\b|brightness|color modes|color temperature/], ['charger', /\bcharger\b|charging|power adapter|qi|magnetic charge/]
        ];
        const features = featurePatterns.filter(([, p]) => p.test(t)).map(([name]) => name);
        let intendedUse = 'general';
        if (/\bgaming\b|mmo|fps|rgb|hero sensor/.test(t)) intendedUse = 'gaming';
        else if (/office|home office|productivity|ergonomic|keyboard|mouse|desk/.test(t)) intendedUse = 'office';
        else if (/portable|travel|mobile|mini|compact|tablet|wireless/.test(t)) intendedUse = 'mobile';
        const suspiciousSource = /ebay|refurbished|renewed|used|open box|pre-?owned/.test(t);
        return { features, intendedUse, suspiciousSource };
      };

      const tokenSet = (text) => new Set(text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(Boolean));
      const jaccard = (a, b) => {
        const A = tokenSet(a), B = tokenSet(b);
        let inter = 0; for (const t of A) if (B.has(t)) inter += 1;
        const union = A.size + B.size - inter;
        return union ? inter / union : 0;
      };
      const openingBigram = (text) => text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(Boolean).slice(0, 2).join(' ');

      const fillTemplate = (template, brand) => template
        .replaceAll('{brand}', brand || 'This')
        .replaceAll('{brandOption}', brand ? `${brand} option` : 'this option')
        .replace(/\s+/g, ' ')
        .trim();

      const buildProductBlurb = (title, diversityState) => {
        const brand = extractBrand(title);
        const category = detectProductCategory(title);
        const { features, intendedUse, suspiciousSource } = detectTitleSignals(title);
        const seed = hashText(title);

        const roles = {
          trackball: ['{brand} trackball is positioned for precise cursor work with reduced wrist travel', 'As a trackball option, {brandOption} favors controlled navigation over fast sweeping motion'],
          combo: ['{brand} combo is built to standardize keyboard and mouse behavior across one desk', 'As an input combo, {brandOption} reduces setup friction for mixed home and office routines'],
          keyboard: ['{brand} keyboard is intended for consistent typing comfort in long writing blocks', 'As a primary keyboard, {brandOption} focuses on stable input quality for daily desk use'],
          mouse: ['{brand} mouse is aimed at controlled, repeatable pointer movement for daily tasks', 'As a daily-use mouse, {brandOption} prioritizes reliable tracking over unnecessary extras'],
          hub: ['{brand} hub is built to centralize laptop connectivity in a single desk anchor point', 'As a port-expansion option, {brandOption} targets cleaner, more stable workstation wiring'],
          deskLamp: ['{brand} desk lamp is designed to support clearer visibility through variable work hours', 'As a task-light option, {brandOption} focuses on practical illumination control for office setups'],
          robotVacuum: ['{brand} robot vacuum is positioned to automate recurring floor cleanup with low supervision', 'As a home-office cleaning option, {brandOption} aims to reduce routine maintenance overhead'],
          tablet: ['{brand} tablet is intended for light productivity and review work away from a full desktop', 'As a secondary-screen option, {brandOption} supports flexible work around meetings and travel'],
          monitorArm: ['{brand} monitor arm is designed to improve screen positioning and free desk surface area', 'As a workspace ergonomics option, {brandOption} focuses on adjustability and cable order'],
          charger: ['{brand} charger is aimed at consolidating power delivery for core desk devices', 'As a power-management option, {brandOption} supports steadier charging across daily gear'],
          general: ['{brand} pick is positioned for practical utility in routine productivity setups', 'As a desk-tech option, {brandOption} focuses on function-first value for regular use']
        };

        const featureClauses = {
          wireless: ['wireless operation keeps movement unrestricted in crowded desk layouts', 'wireless connectivity helps keep cable clutter lower around keyboard and dock zones'],
          wired: ['wired connectivity avoids battery interruptions and keeps response behavior consistent', 'wired operation is useful when you want stable input with no charging cycle management'],
          bluetooth: ['Bluetooth pairing simplifies switching between laptop, tablet, and secondary devices', 'Bluetooth support reduces dependence on extra receivers in compact setups'],
          ergonomic: ['ergonomic shaping can reduce wrist strain across extended work sessions', 'ergonomic contours support lower hand fatigue during repetitive pointer or typing tasks'],
          gaming: ['gaming-oriented tuning favors faster response when quick cursor changes are common', 'gaming-focused hardware can keep tracking behavior more consistent under rapid movement'],
          mmo: ['MMO-style side controls can shift frequent commands away from keyboard reaches', 'extra side-button capacity helps map repetitive actions for faster execution'],
          mechanical: ['mechanical switches provide clearer tactile feedback for long-form typing', 'mechanical key response tends to improve consistency when typing volume is high'],
          rgb: ['RGB lighting can improve key or control visibility in dim work areas', 'RGB zones make low-light sessions easier without changing desk lighting'],
          compact: ['compact sizing fits tighter desks and packs more easily for mobile setups', 'compact footprint leaves more surface area for notebooks, tablets, and accessories'],
          lightweight: ['lightweight construction can lower fatigue during long control-intensive sessions', 'lower weight supports quicker repositioning when switching between tasks'],
          trackball: ['trackball control reduces broad arm movement while keeping fine cursor precision', 'trackball input can help maintain control in limited desk space'],
          aluminum: ['aluminum construction adds rigidity for steadier day-to-day handling', 'metal chassis materials typically hold alignment better under heavy daily use'],
          'hot-swappable': ['hot-swappable sockets simplify switch maintenance and long-term customization', 'hot-swap support lets you tune key feel without replacing the full board'],
          '4k': ['4K output support is useful for sharper spreadsheets, docs, and dashboard views', '4K-ready display paths help preserve text clarity on larger external monitors'],
          hdmi: ['HDMI output streamlines single-cable external display hookups', 'HDMI support improves compatibility with common office and meeting-room screens'],
          ethernet: ['Ethernet can provide steadier throughput than congested shared Wi-Fi', 'wired network support is valuable for calls, uploads, and large sync jobs'],
          '100w': ['higher-wattage USB-C delivery can power laptops while peripherals stay attached', 'power-delivery headroom helps avoid separate laptop chargers at the desk'],
          'usb-c': ['USB-C expansion centralizes accessories and charging through a single connection path', 'USB-C multiport support cuts down repeated plug swapping during the workday'],
          dimmable: ['dimmable output helps match brightness to early-morning and late-evening work blocks', 'adjustable brightness can reduce eye strain when ambient light changes'],
          charger: ['integrated charging reduces adapter sprawl around core daily devices', 'charging support keeps phones and peripherals topped up without extra power bricks']
        };

        const useClauses = {
          gaming: ['its fit is strongest when responsiveness and control mapping matter most', 'it is best matched to gaming-leaning workflows that need quicker input response'],
          office: ['its fit is strongest for office-heavy workflows where consistency is the priority', 'it aligns well with practical office routines that favor low-friction reliability'],
          mobile: ['its fit is strongest for mobile workflows that shift between locations', 'it is better suited to portable setups that need compact, flexible gear'],
          general: ['it is a practical fit for routine productivity work without specialized requirements', 'it should work best in mixed-use setups focused on predictable daily performance']
        };

        const roleTemplates = roles[category] || roles.general;
        const clauses = [];
        features.forEach((f) => { if (featureClauses[f]) clauses.push(...featureClauses[f]); });
        clauses.push(...(useClauses[intendedUse] || useClauses.general));

        let best = '';
        let bestPenalty = Number.POSITIVE_INFINITY;

        for (let attempt = 0; attempt < 16; attempt += 1) {
          const role = fillTemplate(roleTemplates[(seed + attempt) % roleTemplates.length], brand);
          const opener = ['Key benefit:', 'In day-to-day use,', 'Practical upside:'][(seed + attempt) % 3];
          const primary = clauses[(seed + attempt) % clauses.length] || useClauses.general[0];
          const secondary = clauses[(seed + attempt + 3) % clauses.length];

          let candidate = `${role}. ${opener} ${primary}`;
          if (secondary && secondary !== primary && attempt % 3 !== 2) candidate += `; ${secondary}`;
          candidate += '.';

          if (suspiciousSource) {
            const caveat = ' Verify condition, seller quality, and warranty terms before purchase.';
            if (candidate.length + caveat.length <= 180) candidate += caveat;
          }

          if (candidate.length > 180) {
            candidate = candidate.replace(/;[^.]+\./, '.').slice(0, 180).trim();
            if (!/[.!?]$/.test(candidate)) candidate += '.';
          }
          if (candidate.length < 95) {
            const topUp = ['This fit is strongest for steady office workflows that prioritize consistency.', 'It should integrate cleanly into mixed home-office setups with limited overhead.'][(seed + attempt) % 2];
            candidate += ` ${topUp}`;
            if (candidate.length > 180) candidate = candidate.slice(0, 180).trim() + '.';
          }

          const prior = diversityState.blurbs;
          const adjacent = prior[prior.length - 1] || '';
          const pairwise = prior.reduce((m, b) => Math.max(m, jaccard(candidate, b)), 0);
          const adj = adjacent ? jaccard(candidate, adjacent) : 0;
          const sameBigram = openingBigram(candidate) && openingBigram(candidate) === diversityState.lastOpeningBigram;
          const lengthPenalty = candidate.length < 95 ? (95 - candidate.length) : (candidate.length > 180 ? (candidate.length - 180) : 0);
          const penalty = lengthPenalty + (sameBigram ? 35 : 0) + Math.max(0, pairwise - 0.64) * 140 + Math.max(0, adj - 0.54) * 140;

          if (penalty < bestPenalty) { bestPenalty = penalty; best = candidate; }
          if (!sameBigram && pairwise <= 0.64 && adj <= 0.54 && candidate.length >= 95 && candidate.length <= 180) {
            diversityState.blurbs.push(candidate);
            diversityState.lastOpeningBigram = openingBigram(candidate);
            return candidate;
          }
        }

        diversityState.blurbs.push(best);
        diversityState.lastOpeningBigram = openingBigram(best);
        return best;
      };

      const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

      const selectedCategory = getSelectedCategory();
      const categorySelect = document.getElementById('categorySelect');
      if (categorySelect) {
        categorySelect.value = selectedCategory;
        categorySelect.addEventListener('change', () => {
          window.location.href = withCategory('/past-picks.html', categorySelect.value);
        });
      }
      const currentPicksNav = document.getElementById('currentPicksNav');
      const reviewsNav = document.getElementById('reviewsNav');
      if (currentPicksNav) currentPicksNav.href = withCategory('/', selectedCategory);
      if (reviewsNav) reviewsNav.href = withCategory('/reviews.html', selectedCategory);
      const heading = document.querySelector('h1');
      if (heading) heading.textContent = `${CATEGORY_CONFIG[selectedCategory].label} Past Picks Archive`;

      (async () => {
        const root = document.getElementById('archive');
        const meta = document.getElementById('listMeta');
        try {
          const res = await fetch('/assets/past-picks.json', { cache: 'no-store' });
          const data = await res.json();

          const rawItems = Array.isArray(data?.items)
            ? data.items
            : (Array.isArray(data?.batches)
                ? data.batches.flatMap((b) => Array.isArray(b?.items) ? b.items : [])
                : []);

          const normalizeKey = (p) => {
            const url = String(p?.url || '').trim();
            const title = String(p?.title || '').trim().toLowerCase();
            const asinField = String(p?.asin || '').trim().toUpperCase();
            if (asinField) return `asin:${asinField}`;
            const asinMatch = url.match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
            if (asinMatch) return `asin:${asinMatch[1].toUpperCase()}`;
            let cleanUrl = url.replace(/[?#].*$/, '');
            cleanUrl = cleanUrl.replace(/\/$/, '');
            return `url:${cleanUrl}|title:${title}`;
          };

          const seen = new Set();
          const items = [];
          for (const p of rawItems) {
            if (!p?.url || !p?.title) continue;
            const key = normalizeKey(p);
            if (seen.has(key)) continue;
            seen.add(key);
            items.push(p);
          }

          const filteredItems = items.filter((p) => topLevelCategoryFromTitle(String(p.title || '')) === selectedCategory);

          if (!filteredItems.length) {
            meta.textContent = `0 ${CATEGORY_CONFIG[selectedCategory].label.toLowerCase()} picks`;
            root.innerHTML = '<p class="sub">No archived picks yet for this category.</p>';
            return;
          }

          const diversityState = { blurbs: [], lastOpeningBigram: '' };
          meta.textContent = `${filteredItems.length} ${CATEGORY_CONFIG[selectedCategory].label.toLowerCase()} picks`;
          root.innerHTML = filteredItems.map((p) => {
            const cleanTitle = String(p.title || '').replace(/^\s*\d+\)\s*/, '').trim();
            const blurb = buildProductBlurb(cleanTitle, diversityState);
            return `
              <a class="pick" href="${escapeHtml(p.url)}" target="_blank" rel="nofollow sponsored noopener">
                <span class="title">${escapeHtml(cleanTitle)}</span>
                <small>${escapeHtml(blurb)}</small>
                <span class="pick-cta">See pick details →</span>
              </a>
            `;
          }).join('');
        } catch (e) {
          meta.textContent = 'Archive unavailable';
          root.innerHTML = '<p class="sub">Unable to load archive right now.</p>';
        }
      })();
    })();
  </script>
</body>
