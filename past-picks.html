  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "CollectionPage",
          "@id": "https://dealcompass.app/past-picks.html#collectionpage",
          "url": "https://dealcompass.app/past-picks.html",
          "name": "DealCompass Past Picks Archive",
          "description": "Historical productivity and home office tech deal recommendations from DealCompass.",
          "isPartOf": {
            "@id": "https://dealcompass.app/#website"
          }
        },
        {
          "@type": "BreadcrumbList",
          "@id": "https://dealcompass.app/past-picks.html#breadcrumb",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "https://dealcompass.app/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Past Picks",
              "item": "https://dealcompass.app/past-picks.html"
            }
          ]
        }
      ]
    }
  </script>
  <style>
    :root {
      --bg: #050911;
      --bg-soft: #0a1020;
      --surface: rgba(20, 27, 45, 0.7);
      --surface-strong: rgba(26, 36, 60, 0.8);
      --surface-border: rgba(180, 200, 255, 0.08);
      --text: #edf2ff;
      --muted: #94a3c8;
      --brand: #5f8dff;
      --brand-glow: rgba(95, 141, 255, 0.25);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(95, 141, 255, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(120, 100, 255, 0.08) 0%, transparent 40%);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.9; }
    .wrap { width: min(100%, 1080px); margin: 0 auto; padding: 20px 16px 80px; }
    
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 10px 14px; border: 1px solid var(--surface-border); border-radius: 999px;
      background: rgba(10, 16, 32, 0.6); backdrop-filter: blur(12px);
      position: sticky; top: 16px; z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand-logo { height: 32px; width: auto; border-radius: 6px; display: block; }
    .category-select {
      background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; font-family: inherit;
      cursor: pointer; transition: background 0.2s; outline: none;
    }
    .category-select:hover { background: rgba(255,255,255,0.1); }
    .nav-pill {
      font-size: 0.85rem; font-weight: 600; color: #cbd5e1; padding: 6px 14px;
      border-radius: 999px; transition: color 0.2s, background 0.2s;
    }
    .nav-pill:hover { color: #fff; background: rgba(255,255,255,0.05); }

    h1 {
      margin: 32px 0 16px; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -0.03em;
      background: linear-gradient(to bottom right, #fff 30%, #a5b4fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { margin: 0 0 32px; color: var(--muted); font-size: 1.1rem; max-width: 60ch; font-weight: 400; }
    
    .list-wrap { border: 1px solid var(--surface-border); background: var(--surface); border-radius: var(--radius-lg); padding: 20px; }
    .list-meta { margin: 0 0 16px; color: var(--muted); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .scroll-list { max-height: 75vh; overflow-y: auto; padding-right: 8px; display: grid; gap: 12px; }
    .scroll-list::-webkit-scrollbar { width: 6px; }
    .scroll-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
    
    .pick {
      display: block; background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border);
      border-radius: var(--radius-md); padding: 16px; transition: all 0.2s;
    }
    .pick:hover {
      background: rgba(255,255,255,0.06); border-color: rgba(180, 200, 255, 0.15);
      transform: translateX(4px);
    }
    .pick .title { font-size: 1rem; font-weight: 700; color: #fff; display: block; margin-bottom: 6px; }
    .pick small { display: block; color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .pick-cta { display: inline-block; margin-top: 10px; font-size: 0.8rem; font-weight: 700; color: var(--brand); }
    
    .note { margin-top: 40px; font-size: 0.8rem; color: #475569; text-align: center; border-top: 1px solid var(--surface-border); padding-top: 20px; }

    @media (max-width: 768px) {
      .topbar { flex-direction: column; align-items: stretch; border-radius: 16px; gap: 12px; }
      .topbar-left { justify-content: space-between; }
      .topbar-right nav { justify-content: center; width: 100%; display: flex; gap: 4px; }
      .nav-pill { flex: 1; text-align: center; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar" aria-label="DealCompass archive header">
      <div class="topbar-left">
        <select id="categorySelect" class="category-select" aria-label="Select category">
          <option value="tech">Tech</option>
          <option value="home">Home</option>
        </select>
        <a class="brand" href="/" aria-label="DealCompass home">
          <img src="/assets/logo-official.jpg" alt="DealCompass" class="brand-logo" />
        </a>
      </div>
      <nav class="top-links" aria-label="Primary">
        <a class="pill" id="currentPicksNav" href="/">Current Picks</a>
        <a class="pill" id="reviewsNav" href="/reviews.html">Our Verdicts</a>
      </nav>
    </header>

    <h1>Past Picks Archive</h1>
    <p class="sub">Historical recommendations (running list). For the latest ranked deals, see <a href="/">current picks</a>.</p>

    <section class="list-wrap" aria-labelledby="archiveHeading">
      <h2 class="sr-only" id="archiveHeading">Archived picks list</h2>
      <p class="list-meta" id="listMeta">Loading…</p>
      <div id="archive" class="scroll-list"></div>
    </section>

    <p class="note"><strong>Affiliate disclosure:</strong> DealCompass may earn a commission from qualifying purchases made through partner links.</p>
  </main>

  <script src="/assets/blurb-engine.js"></script>
<script>
    (() => {
      const CATEGORY_CONFIG = { tech: { label: 'Tech' }, home: { label: 'Home' } };
      const getSelectedCategory = () => {
        const raw = new URLSearchParams(window.location.search).get('category') || 'tech';
        return CATEGORY_CONFIG[raw] ? raw : 'tech';
      };
      const withCategory = (url, category) => {
        const u = new URL(url, window.location.origin);
        u.searchParams.set('category', category);
        return `${u.pathname}${u.search}`;
      };

      const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

      const selectedCategory = getSelectedCategory();
      const categorySelect = document.getElementById('categorySelect');
      if (categorySelect) {
        categorySelect.value = selectedCategory;
        categorySelect.addEventListener('change', () => {
          window.location.href = withCategory('/past-picks.html', categorySelect.value);
        });
      }
      const currentPicksNav = document.getElementById('currentPicksNav');
      const reviewsNav = document.getElementById('reviewsNav');
      if (currentPicksNav) currentPicksNav.href = withCategory('/', selectedCategory);
      if (reviewsNav) reviewsNav.href = withCategory('/reviews.html', selectedCategory);
      const heading = document.querySelector('h1');
      if (heading) heading.textContent = `${CATEGORY_CONFIG[selectedCategory].label} Past Picks Archive`;

      (async () => {
        const root = document.getElementById('archive');
        const meta = document.getElementById('listMeta');
        try {
          const res = await fetch('/assets/past-picks.json', { cache: 'no-store' });
          const data = await res.json();

          const rawItems = Array.isArray(data?.items)
            ? data.items
            : (Array.isArray(data?.batches)
                ? data.batches.flatMap((b) => Array.isArray(b?.items) ? b.items : [])
                : []);

          const normalizeKey = (p) => {
            const url = String(p?.url || '').trim();
            const title = String(p?.title || '').trim().toLowerCase();
            const asinField = String(p?.asin || '').trim().toUpperCase();
            if (asinField) return `asin:${asinField}`;
            const asinMatch = url.match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
            if (asinMatch) return `asin:${asinMatch[1].toUpperCase()}`;
            let cleanUrl = url.replace(/[?#].*$/, '');
            cleanUrl = cleanUrl.replace(/\/$/, '');
            return `url:${cleanUrl}|title:${title}`;
          };

          const seen = new Set();
          const items = [];
          for (const p of rawItems) {
            if (!p?.url || !p?.title) continue;
            const key = normalizeKey(p);
            if (seen.has(key)) continue;
            seen.add(key);
            items.push(p);
          }

          const filteredItems = items.filter((p) => {
            const rawTitle = String(p.title || '').trim();
            if (!rawTitle || /^amazon product\s+[a-z0-9]{10}$/i.test(rawTitle)) return false;
            const explicit = String(p.category || '').trim().toLowerCase();
            if (!(explicit === 'tech' || explicit === 'home')) return false;
            return explicit === selectedCategory;
          });

          if (!filteredItems.length) {
            meta.textContent = `0 ${CATEGORY_CONFIG[selectedCategory].label.toLowerCase()} picks`;
            root.innerHTML = '<p class="sub">No archived picks yet for this category.</p>';
            return;
          }

          const diversityState = {
            blurbs: [],
            patterns: [],
            usedRoleTemplates: new Set(),
            usedRoleLines: new Set(),
            usedPrimaryClauses: new Set(),
            usedAnglesByCategory: { hub: new Set() },
            lastOpeningBigram: ''
          };

          const needsBlurbRefresh = (blurb) => {
            const b = String(blurb || '').toLowerCase().trim();
            if (!b) return true;
            return /chosen for|practical daily|repeatable way|workflow consistency|low-regret|high-signal shortlist/.test(b);
          };

          meta.textContent = `${filteredItems.length} ${CATEGORY_CONFIG[selectedCategory].label.toLowerCase()} picks`;
          
          root.innerHTML = filteredItems.map((p) => {
            let cleanTitle = String(p.title || '').replace(/^\s*\d+\)\s*/, '').trim();
            if (!cleanTitle || cleanTitle.toLowerCase() === 'dealcompass archived pick') {
              const m = String(p.url || '').match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
              if (m) cleanTitle = `Amazon Product ${m[1].toUpperCase()}`;
            }
            
            let blurb = String(p.blurb || '').trim();
            if (needsBlurbRefresh(blurb)) {
               blurb = window.DCBlurbEngine.generateBlurb(cleanTitle, {
                 category: selectedCategory,
                 state: diversityState
               });
            } else {
               // Update state so subsequent gens respect this existing one
               diversityState.blurbs.push(blurb);
            }

            return `
              <a class="pick" href="${escapeHtml(p.url)}" target="_blank" rel="nofollow sponsored noopener">
                <span class="title">${escapeHtml(cleanTitle)}</span>
                <small>${escapeHtml(blurb)}</small>
                <span class="pick-cta">See pick details →</span>
              </a>
            `;
          }).join('');
        } catch (e) {
          meta.textContent = 'Archive unavailable';
          root.innerHTML = '<p class="sub">Unable to load archive right now.</p>';
        }
      })();
    })();
  </script>
</body>
</html>
