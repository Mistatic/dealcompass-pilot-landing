<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DealCompass — Past Picks Archive</title>
  <meta name="description" content="DealCompass past picks archive: historical ranked recommendations and affiliate links." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    :root { --bg:#070b16; --bg-soft:#0d1427; --surface:rgba(19,28,51,.88); --text:#f4f7ff; --muted:#a9b7dc; --border:rgba(174,195,255,.2); --brand:#5f8dff; --radius:14px; }
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Manrope,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,var(--bg-soft),var(--bg));}
    .wrap{width:min(100%,1040px);margin:0 auto;padding:22px 14px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(8,14,29,.7);margin-bottom:16px}
    .brand{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:.92rem}
    .top-links{display:flex;gap:8px}
    .pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:6px 10px;text-decoration:none;color:#dbe7ff;font-size:.76rem;font-weight:700}
    h1{margin:8px 0 8px;font-size:clamp(1.5rem,5vw,2.2rem)}
    .sub{margin:0 0 14px;color:var(--muted)}
    .list-wrap{border:1px solid var(--border);background:var(--surface);border-radius:18px;padding:14px;margin-top:14px}
    .list-meta{margin:0 0 10px;color:var(--muted);font-size:.88rem}
    .scroll-list{max-height:70vh;overflow-y:auto;padding-right:4px}
    .pick{display:block;text-decoration:none;color:inherit;border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:rgba(20,31,61,.9);margin-top:8px}
    .pick .title{display:block;font-weight:700;color:#dbe7ff}
    .pick small{display:block;color:var(--muted);margin-top:6px}
    .pick-cta{display:inline-block;margin-top:8px;font-size:.8rem;font-weight:700;color:#bcd1ff}
    .note{margin-top:16px;color:#91a7d8;font-size:.8rem}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <div class="brand">DealCompass</div>
      <div class="top-links">
        <a class="pill" href="/">Current Picks</a>
      </div>
    </header>

    <h1>Past Picks Archive</h1>
    <p class="sub">Historical recommendations (running list).</p>

    <section class="list-wrap">
      <p class="list-meta" id="listMeta">Loading…</p>
      <div id="archive" class="scroll-list"></div>
    </section>

    <p class="note"><strong>Affiliate disclosure:</strong> DealCompass may earn a commission from qualifying purchases made through partner links.</p>
  </main>

  <script>
    (async () => {
      const root = document.getElementById('archive');
      const meta = document.getElementById('listMeta');
      try {
        const res = await fetch('/assets/past-picks.json', { cache: 'no-store' });
        const data = await res.json();

        const rawItems = Array.isArray(data?.items)
          ? data.items
          : (Array.isArray(data?.batches)
              ? data.batches.flatMap((b) => Array.isArray(b?.items) ? b.items : [])
              : []);

        const normalizeKey = (p) => {
          const url = String(p?.url || '').trim();
          const title = String(p?.title || '').trim().toLowerCase();
          // Prefer ASIN-based dedupe so the same product with different Amazon URL params doesn't duplicate.
          const asinMatch = url.match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
          if (asinMatch) return `asin:${asinMatch[1].toUpperCase()}`;
          // Fallback: strip query/hash and normalize trailing slash.
          let cleanUrl = url.replace(/[?#].*$/, '');
          cleanUrl = cleanUrl.replace(/\/$/, '');
          return `url:${cleanUrl}|title:${title}`;
        };

        const seen = new Set();
        const items = [];
        for (const p of rawItems) {
          if (!p?.url || !p?.title) continue;
          const key = normalizeKey(p);
          if (seen.has(key)) continue;
          seen.add(key);
          items.push(p);
        }

        if (!items.length) {
          meta.textContent = '0 unique picks';
          root.innerHTML = '<p class="sub">No archived picks yet.</p>';
          return;
        }

        meta.textContent = `${items.length} unique picks`;
        root.innerHTML = items.map((p) => `
          <a class="pick" href="${p.url}" target="_blank" rel="nofollow sponsored noopener">
            <span class="title">${p.title}</span>
            <small>${p.blurb || ''}</small>
            <span class="pick-cta">See pick details →</span>
          </a>
        `).join('');
      } catch (e) {
        meta.textContent = 'Archive unavailable';
        root.innerHTML = '<p class="sub">Unable to load archive right now.</p>';
      }
    })();
  </script>
</body>
</html>
